name: Build Kagami

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup CMake / Ninja / zip
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Install manager NDK & CMake
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;29.0.14206865" "cmake;3.22.1"

      - name: Decode signing keystore
        env:
          KAGAMI_KEYSTORE_BASE64: ${{ secrets.KAGAMI_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KAGAMI_KEYSTORE_BASE64" ]; then
            echo "No KAGAMI_KEYSTORE_BASE64 secret — manager APK will be built unsigned."
            exit 0
          fi
          echo "$KAGAMI_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/kagami.jks"
          echo "KAGAMI_KEYSTORE=$RUNNER_TEMP/kagami.jks" >> "$GITHUB_ENV"

      - name: Build & package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          KAGAMI_KEYSTORE_PASSWORD: ${{ secrets.KAGAMI_KEYSTORE_PASSWORD }}
          KAGAMI_KEY_ALIAS: ${{ secrets.KAGAMI_KEY_ALIAS }}
          KAGAMI_KEY_PASSWORD: ${{ secrets.KAGAMI_KEY_PASSWORD }}
        run: |
          chmod +x build.sh scripts/*.sh manager/gradlew
          ./build.sh package

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: kagami-${{ env.VERSION_NAME }}
          path: build/arm64-v8a/out/*.zip
          if-no-files-found: error

      - name: Upload to Telegram
        if: github.ref == 'refs/heads/main'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: "Kagami Build"
          VERSION: ${{ env.VERSION_NAME }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "BOT_TOKEN/CHAT_ID not set, skipping Telegram upload."
            exit 0
          fi
          python3 -m pip install --break-system-packages --quiet telethon
          ZIP=$(ls build/arm64-v8a/out/*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then echo "No zip to upload"; exit 1; fi
          FILES="$ZIP"
          APK=$(ls manager/app/build/outputs/apk/release/*.apk 2>/dev/null | grep -v unsigned | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "$RUNNER_TEMP/KagamiManager.apk"
            FILES="$FILES $RUNNER_TEMP/KagamiManager.apk"
          fi
          echo "Uploading to Telegram: $FILES"
          python3 scripts/kagamibot.py $FILES
