name: Build Kagami

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup CMake / Ninja / zip
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Set version from git
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_HASH=$(git rev-parse --short=8 HEAD)
          VERSION_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          sed -i "s/^version=.*/version=${VERSION_TAG}/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=${COMMIT_COUNT}/" module/module.prop
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "SHORT_HASH=$SHORT_HASH" >> "$GITHUB_ENV"
          echo "Building ${VERSION_TAG} (versionCode=${COMMIT_COUNT})"

      - name: Build & package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x build.sh scripts/*.sh
          ./build.sh package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kagami-${{ env.VERSION_TAG }}-${{ env.SHORT_HASH }}
          path: build-android-*/out/*.zip
          if-no-files-found: error
